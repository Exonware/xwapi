# Source size (src/*): ~709.8 KB
[build-system]
  requires = ["hatchling"]
  build-backend = "hatchling.build"

[project]
  name = "exonware-xwsyntax"
  dynamic = ["version"]
  description = "Universal grammar engine with bidirectional parsing and generation for 31+ formats"
  readme = "README.md"
  requires-python = ">=3.12"
  keywords = ["grammar", "parsing", "bidirectional", "syntax", "exonware"]
  classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
  ]
  dependencies = [
    "exonware-xwsystem",
    "exonware-xwnode",
    "lark>=1.1.0",
  ]
  authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
  ]

  [project.license]
    text = "MIT"

  [project.optional-dependencies]
    lazy = [
      "exonware-xwlazy",
    ]
    dev = [
      "black>=23.0.0",
      "isort>=5.12.0",
      "mypy>=1.0.0",
      "pytest>=7.0.0",
      "pytest-asyncio>=0.21.0",
      "pytest-cov>=4.0.0",
      "exonware-xwlazy",
    ]
    full = [
      "aiofiles",
      "cryptography",
      "bcrypt",
      "psutil",
      "opentelemetry-api",
      "cachebox",
      "cachetools",
      "pylru",
      "msgspec",
      "orjson",
      "hyperlight_hyperjson",
      "json5",
      "PyYAML",
      "tomli-w",
      "xmltodict",
      "dicttoxml",
      "msgpack>=1.0.0",
      "cbor2>=5.0.0",
      "pymongo",
      "httpx>=0.23.0",
      "brotli",
      "zstandard",
      "click",
      "Pygments",
      "rich",
      "attrs",
      "sniffio",
      "trio",
      "lark>=1.1.0",
      "regex",
      "atomicwrites",
      "interegular",
      "scikit-learn",
      "uarray",
      "pyjson5>=1.0.0",
      "pygls>=1.0.0",
      "tree-sitter>=0.20.0",
    ]

  [project.urls]
    Homepage = "https://exonware.com"
    Repository = "https://github.com/exonware/xwsyntax"
    Documentation = "https://github.com/exonware/xwsyntax#readme"
    Subtree = "https://github.com/exonware/xwsyntax.git"

[tool.hatch]
  [tool.hatch.version]
    path = "src/exonware/xwsyntax/version.py"

  [tool.hatch.build]
    [tool.hatch.build.targets]
      [tool.hatch.build.targets.wheel]
        packages = ["src/exonware"]

      [tool.hatch.build.targets.sdist]
        include = ["/src", "/tests", "/README.md", "/.github"]
