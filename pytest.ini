[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization (aligned with GUIDE_DEV.md priorities)
markers =
    xwapi_core: Core functionality and integration tests
    xwapi_unit: Unit tests for individual components
    xwapi_integration: Integration tests across modules
    xwapi_advance: Advance quality tests (v1.0.0+)
    xwapi_security: Security excellence tests (Priority #1)
    xwapi_usability: Usability excellence tests (Priority #2)
    xwapi_maintainability: Maintainability excellence tests (Priority #3)
    xwapi_performance: Performance excellence tests (Priority #4)
    xwapi_extensibility: Extensibility excellence tests (Priority #5)
    xwapi_optional_engine: Optional HTTP framework dependency (engines-http extra)

# Test output configuration
# ⚠️ CRITICAL: Do NOT use --disable-warnings or --maxfail=10
# These flags hide real problems and violate root cause fixing principles
addopts =
    -v
    --tb=short
    --strict-markers
    -x

